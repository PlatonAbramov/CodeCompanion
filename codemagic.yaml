workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: PAGCRM
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.platonabramov.app
      node: v18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: cd ios/App && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa